    <main>
        <h2>Em manutenção</h2>
    </main>

    <footer>
        <h5>StockX</h5>
        <p>©2026 StockX. All Rights Reserved.</p>
    </footer>

    <script>
        const text = document.querySelector("h2");
        let contador = 0;

        setInterval(() => {
            switch(contador) {
                case 0: text.innerText = "Em manutenção.";
                contador++;
                break;
                case 1: text.innerText = "Em manutenção..";
                contador++;
                break;
                case 2: text.innerText = "Em manutenção...";
                contador = 0;
                break;
            };
        },500)
    </script>
